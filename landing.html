<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RC Celta — ¡Avísame!</title>
    <style>
      :root {
        --celta-sky: #00A3E0;
        --celta-red: #E4002B;
        --celta-ink: #1a1a1a;
        --celta-mute: #F5F5F5;
        --celta-border: #d8dde5;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        color: var(--celta-ink);
        background: var(--celta-mute);
        line-height: 1.5;
        font-size: 16px;
      }

      header {
        position: relative;
        overflow: hidden;
        background: var(--celta-sky);
        color: #fff;
        padding: 4rem 1.25rem 3.5rem;
        text-align: center;
        isolation: isolate;
      }

      header .hero-video {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: 0;
      }

      header::after {
        content: "";
        position: absolute;
        inset: 0;
        z-index: 1;
        background:
          linear-gradient(180deg,
            rgba(0, 163, 224, 0.55) 0%,
            rgba(0, 163, 224, 0.78) 55%,
            rgba(0, 122, 168, 0.92) 100%);
        pointer-events: none;
      }

      header section {
        position: relative;
        z-index: 2;
        max-width: 520px;
        margin: 0 auto;
      }

      header h1,
      header p,
      header img {
        text-shadow: 0 2px 12px rgba(10, 30, 60, 0.35);
      }
      header img { filter: drop-shadow(0 4px 10px rgba(10, 30, 60, 0.35)); text-shadow: none; }

      @media (prefers-reduced-motion: reduce) {
        header .hero-video { display: none; }
      }

      header img {
        max-width: 140px;
        height: auto;
        margin-bottom: 1.25rem;
      }

      header h1 {
        color: #fff;
        font-size: 2.75rem;
        font-weight: 800;
        letter-spacing: 0.02em;
        text-transform: uppercase;
        margin: 0 0 0.75rem;
      }

      header p {
        margin: 0;
        font-size: 1.0625rem;
        opacity: 0.95;
      }

      main {
        max-width: 520px;
        margin: -2rem auto 3rem;
        padding: 2.25rem 1.5rem;
        background: #fff;
        border-radius: 8px;
        box-shadow: 0 6px 24px rgba(0, 0, 0, 0.06);
        position: relative;
      }

      form p {
        margin: 0 0 1.25rem;
      }

      form label {
        display: block;
        margin-bottom: 0.4rem;
        font-weight: 600;
        font-size: 0.8125rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--celta-ink);
      }

      form input[type="text"],
      form input[type="email"],
      form select {
        width: 100%;
        padding: 0.7rem 0.9rem;
        font: inherit;
        font-size: 16px;
        color: var(--celta-ink);
        border: 1px solid var(--celta-border);
        border-radius: 6px;
        background: #fff;
        transition: border-color 0.15s ease, box-shadow 0.15s ease, background-color 0.15s ease;
      }

      form input[type="text"]:hover,
      form input[type="email"]:hover,
      form select:hover {
        border-color: #b8c0cc;
      }

      form input[type="text"]:focus,
      form input[type="email"]:focus,
      form select:focus {
        outline: none;
        border-color: var(--celta-sky);
        box-shadow: 0 0 0 3px rgba(0, 163, 224, 0.2);
      }

      form select {
        appearance: none;
        -webkit-appearance: none;
        -moz-appearance: none;
        padding-right: 2.5rem;
        background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8' fill='none'><path d='M1 1.5L6 6.5L11 1.5' stroke='%231a1a1a' stroke-width='1.6' stroke-linecap='round' stroke-linejoin='round'/></svg>");
        background-repeat: no-repeat;
        background-position: right 0.95rem center;
        cursor: pointer;
      }
      form select:disabled { cursor: not-allowed; opacity: 0.6; }

      form input[type="checkbox"] {
        margin: 0;
        accent-color: var(--celta-sky);
        width: 1.05rem;
        height: 1.05rem;
        flex-shrink: 0;
        margin-top: 0.15rem;
        cursor: pointer;
      }

      form label:has(input[type="checkbox"]) {
        font-weight: 400;
        font-size: 0.9375rem;
        text-transform: none;
        letter-spacing: normal;
        display: flex;
        align-items: flex-start;
        gap: 0.6rem;
        cursor: pointer;
        user-select: none;
        padding: 0.15rem 0;
      }
      form label:has(input[type="checkbox"]):hover { color: #000; }

      button[type="submit"] {
        display: block;
        width: 100%;
        padding: 0.95rem 1rem;
        font: inherit;
        font-weight: 700;
        font-size: 0.9375rem;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: #fff;
        background: var(--celta-red);
        border: none;
        border-radius: 6px;
        cursor: pointer;
        box-shadow: 0 1px 2px rgba(228, 0, 43, 0.18);
        transition: background-color 0.15s ease, box-shadow 0.18s ease, transform 0.08s ease;
      }

      button[type="submit"]:hover {
        background: #c70026;
        box-shadow: 0 6px 14px rgba(228, 0, 43, 0.28);
        transform: translateY(-1px);
      }
      button[type="submit"]:active {
        transform: translateY(0);
        box-shadow: 0 1px 2px rgba(228, 0, 43, 0.2);
      }
      button[type="submit"]:focus-visible {
        outline: none;
        box-shadow: 0 0 0 3px rgba(228, 0, 43, 0.32), 0 6px 14px rgba(228, 0, 43, 0.18);
      }

      @media (max-width: 480px) {
        header { padding: 2.75rem 1rem 2.5rem; }
        header h1 { font-size: 2.25rem; letter-spacing: 0.01em; }
        header img { max-width: 110px; margin-bottom: 1rem; }
        header p { font-size: 1rem; }
        main { padding: 1.75rem 1.25rem; margin: -1.5rem 0.85rem 2rem; }
        form p { margin: 0 0 1rem; }
      }

      @media (min-width: 640px) {
        header { padding: 5rem 1.25rem 4.5rem; }
        header h1 { font-size: 3.25rem; }
        header p { font-size: 1.125rem; }
        main { padding: 2.75rem 2.25rem; }
      }
    </style>
  </head>

    <script>
      document.addEventListener('DOMContentLoaded', function () {
        var form = document.getElementById('avisame-form');
        form.addEventListener('submit', function (event) {
          event.preventDefault();
          var data = Object.fromEntries(new FormData(form));
          data.privacidad = form.privacidad.checked;
          console.log(data);
        });
      });

</html>
