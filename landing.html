    <script>
      document.addEventListener('DOMContentLoaded', function () {
        var form     = document.getElementById('avisame-form');
        var button   = form.querySelector('button[type="submit"]');
        var statusEl = document.getElementById('form-status');
        var originalLabel = button.textContent;

        function showStatus(kind, msg) {
          statusEl.className = 'form-status form-status--' + kind;
          statusEl.textContent = msg;
          statusEl.hidden = false;
        }
        function clearStatus() { statusEl.hidden = true; statusEl.textContent = ''; }

        form.addEventListener('submit', function (event) {
          event.preventDefault();
          clearStatus();

          var cfg   = window.AVISAME_CONFIG || {};
          var match = window.MATCH_CONTEXT  || {};
          if (!cfg.configured || !cfg.u || !cfg.listWebId || !cfg.listManageHost) {
            showStatus('error', 'Configuración pendiente. Vuelve a intentarlo en unos minutos.');
            return;
          }

          // Capture grada display text alongside the option value (sector ID)
          var gradaSel = form.grada;
          var gradaId   = gradaSel.value;
          var gradaText = gradaSel.options[gradaSel.selectedIndex] ? gradaSel.options[gradaSel.selectedIndex].text : '';

          var fields = {
            EMAIL:      form.email.value.trim(),
            FNAME:      form.nombre.value.trim(),
            LNAME:      form.apellidos.value.trim(),
            GRADA:      gradaText,
            GRADAID:    gradaId,
            MATCH:      match.name || '',
            MATCHID:    match.id || '',
            MATCHDATE:  match.dateForMC || '',
            VENUE:      match.venue || '',
            MATCHPRICE: match.priceText || '',
            MATCHSTAT:  match.status || '',
            PRIVACYTS:  form.privacidad.checked ? new Date().toISOString() : '',
            SOURCE:     'landing-v1'
          };

          // Build JSONP URL
          var url = new URL('https://' + cfg.listManageHost + '/subscribe/post-json');
          url.searchParams.set('u',  cfg.u);
          url.searchParams.set('id', cfg.listWebId);
          Object.keys(fields).forEach(function (k) { url.searchParams.set(k, fields[k]); });
          // Honeypot — bots tend to fill empty hidden fields
          url.searchParams.set('b_' + cfg.u + '_' + cfg.listWebId, '');
          var cbName = '__avisameCb_' + Date.now() + '_' + Math.floor(Math.random() * 1e6);
          url.searchParams.set('c', cbName);

          button.disabled = true;
          button.textContent = 'Enviando…';
          showStatus('loading', 'Enviando…');

          var script = document.createElement('script');
          var done = false;
          var cleanup = function () {
            if (done) return;
            done = true;
            if (script.parentNode) script.parentNode.removeChild(script);
            try { delete window[cbName]; } catch (e) { window[cbName] = undefined; }
            button.disabled = false;
            button.textContent = originalLabel;
          };
          var timeoutId = setTimeout(function () {
            cleanup();
            showStatus('error', 'No pudimos contactar con Mailchimp. Inténtalo de nuevo.');
          }, 12000);

          window[cbName] = function (resp) {
            clearTimeout(timeoutId);
            cleanup();
            if (resp && resp.result === 'success') {
              showStatus('success', '¡Listo! Te avisaremos cuando se abran entradas.');
              form.reset();
            } else {
              var msg = (resp && resp.msg) || 'No se pudo completar la inscripción.';
              msg = String(msg).replace(/^\d+\s*-\s*/, ''); // strip "0 - " prefix Mailchimp adds
              showStatus('error', msg);
            }
          };
          script.onerror = function () {
            clearTimeout(timeoutId);
            cleanup();
            showStatus('error', 'Error de red al enviar el formulario.');
          };
          script.src = url.toString();
          document.body.appendChild(script);
        });
      });
    </script>
